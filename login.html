<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập – Giáo Trình Microsoft Word</title>
  <link rel="stylesheet" href="index.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrapper {
      width: 100%; max-width: 420px; padding: 20px;
    }
    .login-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      text-align: center;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .login-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(59,130,246,0.12), transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(139,92,246,0.1), transparent 50%);
      pointer-events: none;
    }
    .login-card > * { position: relative; z-index: 1; }
    .login-logo {
      width: 72px; height: 72px; margin: 0 auto 20px;
      background: var(--gradient-primary);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800; color: white;
      box-shadow: 0 8px 24px rgba(59,130,246,0.3);
    }
    .login-card h1 {
      font-size: 24px; font-weight: 800; margin-bottom: 6px;
      background: var(--gradient-primary);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-card .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .form-group {
      text-align: left; margin-bottom: 18px;
    }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .form-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .login-btn {
      width: 100%; padding: 14px;
      background: var(--gradient-primary);
      color: white; border: none; cursor: pointer;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 700;
      transition: var(--transition);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.35); }
    .login-btn:active { transform: translateY(0); }
    .error-msg {
      display: none; margin-top: 14px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-sm);
      color: var(--accent-red);
      font-size: 13px; font-weight: 500;
      animation: shake 0.4s ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .login-footer {
      margin-top: 28px; font-size: 11px; color: var(--text-muted);
    }
    .particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(59,130,246,0.08);
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Background particles -->
  <div class="particles" id="particles"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">W</div>
      <h1>Giáo Trình Word</h1>
      <p class="subtitle">Vui lòng đăng nhập để truy cập giáo trình</p>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username">👤 Tên đăng nhập</label>
          <input type="text" id="username" class="form-input" placeholder="Nhập tên đăng nhập" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">🔒 Mật khẩu</label>
          <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">🚀 Đăng nhập</button>
        <div class="error-msg" id="errorMsg">❌ Sai tên đăng nhập hoặc mật khẩu!</div>
      </form>

      <div class="login-footer">© 2024 Giáo Trình Microsoft Word</div>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (sessionStorage.getItem('word_auth') === 'true') {
      window.location.href = 'index.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      if (user === 'admin' && pass === '2810') {
        sessionStorage.setItem('word_auth', 'true');
        window.location.href = 'index.html';
      } else {
        const err = document.getElementById('errorMsg');
        err.classList.remove('show');
        void err.offsetWidth; // trigger reflow for re-animation
        err.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
      return false;
    }

    // Generate particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 3;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (Math.random() * 15 + 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
